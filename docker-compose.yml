x-logging: &default-logging {driver: "json-file", options: {max-size: "10m", max-file: "3"}}

services:
  postgres:
    image: postgres:13
    restart: unless-stopped
    cpus: "2.0"
    mem_limit: 6g
    logging: *default-logging
    networks: [_llm-net]
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 10s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7.0-alpine
    restart: unless-stopped
    volumes:
      - ./data/redis:/data
    expose:
      - "6379"
    logging: *default-logging
    networks: [_llm-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 5
  qdrant:
    image: qdrant/qdrant
    restart: unless-stopped
    volumes:
      - ./data/qdrant:/qdrant/data
    expose:
      - "6333"
    logging: *default-logging
    networks: [_llm-net]
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 10s
      retries: 5
  vllm:
    image: vllm/vllm-openai:latest
    restart: unless-stopped
    cpus: "12.0"
    mem_limit: 32g
    logging: *default-logging
    networks: [_llm-net]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./models:/models
    entrypoint: python3 -m vllm.entrypoints.openai.api_server
    command: ["--model", "Qwen/Qwen2.5-7B-Instruct", "--host", "0.0.0.0", "--port", "8000", "--max-model-len", "8192", "--gpu-memory-utilization", "0.90", "--max-num-seqs", "16"]
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 120s
  litellm:
    image: litellm/litellm:latest
    restart: unless-stopped
    cpus: "2.0"
    mem_limit: 4g
    logging: *default-logging
    networks: [_llm-net]
    command: --config /app/configs/litellm.yaml
    env_file:
      - .env
    volumes:
      - ./configs/litellm.yaml:/app/configs/litellm.yaml
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s = socket.create_connection((\"localhost\", 4000), timeout=1); s.close()'"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 180s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vllm:
        condition: service_healthy
  node-exporter:
    image: prom/node-exporter
    restart: unless-stopped
    command: --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave
    ports:
      - "9100:9100"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9100/metrics || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging: *default-logging
    networks: [_llm-net]
  prometheus:
    image: prom/prometheus
    restart: unless-stopped
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./data/prometheus:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/ready"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging: *default-logging
    networks: [_llm-net]
  grafana:
    image: grafana/grafana
    restart: unless-stopped
    user: "0"
    ports:
      - "3001:3000"
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./configs/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./configs/grafana/dashboards:/etc/grafana/provisioning/dashboards
    environment:
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    depends_on:
      prometheus:
        condition: service_healthy
    logging: *default-logging
    networks: [_llm-net]
  dcgm-exporter:
    image: nvidia/dcgm-exporter
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "9400:9400"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9400'"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging: *default-logging
    networks: [_llm-net]
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    cpus: "2.0"
    mem_limit: 4g
    environment:
      OPENAI_API_BASE_URL: http://litellm:4000/v1
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ENABLE_OLLAMA_API: "false"
    ports:
      - "3000:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 300s
    depends_on:
      litellm:
        condition: service_healthy
    logging: *default-logging
    networks: [_llm-net]
  nginx:
    image: nginx:latest
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      open-webui:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 600s
    logging: *default-logging
    networks: [_llm-net]

networks:
  _llm-net:
    driver: bridge
