services:
  postgres:
    image: postgres:13
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 10s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7.0-alpine
    volumes:
      - ./data/redis:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 5
  qdrant:
    image: qdrant/qdrant
    volumes:
      - ./data/qdrant:/qdrant/data
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 10s
      retries: 5
  vllm:
    image: vllm/vllm-openai:latest
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./models:/models
    entrypoint: python3 -m vllm.entrypoints.openai.api_server
    command: ["--model", "HuggingFaceH4/tiny-random-LlamaForCausalLM", "--host", "0.0.0.0", "--port", "8000"]
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 120s
  litellm:
    image: litellm/litellm:latest
    command: --config /app/configs/litellm.yaml
    volumes:
      - ./configs/litellm.yaml:/app/configs/litellm.yaml
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s = socket.create_connection((\"localhost\", 4000), timeout=1); s.close()'"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 180s
    depends_on:
      - postgres
      - redis
      - vllm
  node-exporter:
    image: prom/node-exporter
    command: --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave
    ports:
      - "9100:9100"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9100/metrics"]
      interval: 5s
      timeout: 3s
      retries: 5
  prometheus:
    image: prom/prometheus
    volumes:
      - ./data/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./data/prometheus:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/ready"]
      interval: 5s
      timeout: 3s
      retries: 5
  grafana:
    image: grafana/grafana
    user: "0"
    ports:
      - "3001:3000"
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./configs/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./configs/grafana/dashboards:/etc/grafana/provisioning/dashboards
    environment:
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    depends_on:
      - prometheus
  dcgm-exporter:
    image: nvidia/dcgm-exporter
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "9400:9400"
    healthcheck:
      test: ["CMD-SHELL", "netstat -tuln | grep 9400 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    environment:
      OLLAMA_API_BASE_URL: http://litellm:4000
    ports:
      - "3000:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 300s
    depends_on:
      - litellm
  nginx:
    image: nginx:latest
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      open-webui:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 600s