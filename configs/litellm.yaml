model_list:
  # Keep model_name literal; this field is shown as-is in LiteLLM and env
  # interpolation is unreliable here.
  - model_name: "qwen-3.5-9b"
    litellm_params:
      # Keep model literal too; mounted LiteLLM config is not Compose-templated.
      model: "openai/Qwen/Qwen3.5-9B"
      api_base: "http://vllm:8000/v1"
      api_key: "os.environ/LITELLM_API_KEY"
      max_tokens: "os.environ/MODEL_DEFAULT_MAX_TOKENS"
      temperature: "os.environ/MODEL_DEFAULT_TEMPERATURE"
      top_p: "os.environ/MODEL_DEFAULT_TOP_P"
  # Uncomment and add your API keys to enable cloud models:
  # - model_name: "gpt-4o"
  #   litellm_params:
  #     model: "gpt-4o"
  #     api_key: "os.environ/OPENAI_API_KEY"
  # - model_name: "claude-sonnet"
  #   litellm_params:
  #     model: "claude-sonnet-4-20250514"
  #     api_key: "os.environ/ANTHROPIC_API_KEY"

general_settings:
  rpm: 120
  tpm: 120000
  master_key: "os.environ/LITELLM_MASTER_KEY"
  database_url: "os.environ/LITELLM_DATABASE_URL"
  redis_url: "redis://redis:6379"
  host: "0.0.0.0"
  port: 4000

litellm_settings:
  callbacks: ["prometheus"]
  require_auth_for_metrics_endpoint: true
